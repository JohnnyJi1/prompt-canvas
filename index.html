<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt Canvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg:#07090c;--fg:#f4f4f5;--header:rgba(11,14,17,.95);--canvas:#090d12;--grid:rgba(255,255,255,.06);--panel:rgba(17,22,29,.95);--panel-solid:#11161d;--line:rgba(255,255,255,.10);--line-strong:rgba(255,255,255,.24);--muted:#a1a1aa;--muted-2:#71717a;--field:#0b0e11;--soft:rgba(255,255,255,.04);--soft-hover:rgba(255,255,255,.08);--accent:#00d09c;--accent-text:#07100d}
    body.light{--bg:#f5f7fb;--fg:#101418;--header:rgba(255,255,255,.92);--canvas:#f6f8fb;--grid:rgba(15,23,42,.08);--panel:rgba(255,255,255,.96);--panel-solid:#ffffff;--line:rgba(15,23,42,.13);--line-strong:rgba(15,23,42,.24);--muted:#475569;--muted-2:#64748b;--field:#ffffff;--soft:rgba(15,23,42,.045);--soft-hover:rgba(15,23,42,.08);--accent:#00b386;--accent-text:#ffffff}
    html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input,textarea,select{font:inherit}button{touch-action:manipulation}
    #canvas{height:calc(100vh - 194px);min-height:420px;position:relative;overflow:hidden;cursor:grab;background-color:var(--canvas);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),radial-gradient(circle at 18% 0,rgba(0,208,156,.16),transparent 34%);background-size:32px 32px,32px 32px,100% 100%}
    #canvas.panning{cursor:grabbing}
    #world{position:absolute;left:0;top:0;width:1px;height:1px;transform-origin:0 0}
    #edgesSvg{position:absolute;left:0;top:0;width:1px;height:1px;overflow:visible;pointer-events:none}
    #nodes{position:absolute;left:0;top:0;width:1px;height:1px}
    .edge-path{fill:none;stroke:#00d09c;stroke-width:2.4;stroke-linecap:round;opacity:.72;pointer-events:stroke;cursor:pointer;vector-effect:non-scaling-stroke}
    .edge-hit{fill:none;stroke:transparent;stroke-width:16;pointer-events:stroke;cursor:pointer}.edge-path.dimmed{opacity:.14}.edge-path.active{stroke:#fff;opacity:.95}
    .edge-label{font-size:12px;fill:var(--muted);paint-order:stroke;stroke:var(--canvas);stroke-width:4px;pointer-events:none}
    .edge-delete{fill:#ef4444;opacity:0;pointer-events:all;cursor:pointer}.edge-group:hover .edge-delete{opacity:1}.edge-delete-x{fill:#fff;font-size:12px;font-weight:700;pointer-events:none;opacity:0}.edge-group:hover .edge-delete-x{opacity:1}
    .temp-edge{fill:none;stroke:#fbbf24;stroke-width:2.4;stroke-dasharray:7 5;vector-effect:non-scaling-stroke}
    .node{position:absolute;width:326px;min-height:238px;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:0 18px 48px rgba(0,0,0,.18);backdrop-filter:blur(14px);cursor:grab;user-select:none;transition:border-color .15s,background .15s,opacity .15s,box-shadow .15s}
    .node:hover{border-color:var(--line-strong);background:var(--panel)}.node.dragging{cursor:grabbing;z-index:20;opacity:.92;transition:none}.node.selected,.node.multi-selected{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,208,156,.18),0 18px 48px rgba(0,0,0,.20)}.node.dimmed{opacity:.22}.hidden-node{display:none}
    .node-body{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
    .port{position:absolute;top:50%;width:14px;height:14px;border:2px solid var(--panel-solid);border-radius:50%;background:var(--accent);transform:translateY(-50%);opacity:.25;cursor:crosshair;transition:opacity .15s,transform .15s}.node:hover .port,.node.selected .port{opacity:1}.port:hover{transform:translateY(-50%) scale(1.25)}.port.left{left:-7px}.port.right{right:-7px}
    .scrollbar-thin::-webkit-scrollbar{height:8px;width:8px}.scrollbar-thin::-webkit-scrollbar-thumb{background:#303946;border-radius:999px}
    .app-header{background:var(--header);border-color:var(--line)}.btn-ghost{border-color:var(--line);background:var(--soft);color:var(--fg)}.btn-ghost:hover{background:var(--soft-hover)}.field{border-color:var(--line);background:var(--field);color:var(--fg)}.panel{border-color:var(--line);background:var(--panel-solid);color:var(--fg)}.muted{color:var(--muted)}.muted-2{color:var(--muted-2)}.chip{background:var(--soft);color:var(--fg)}.hint{border-color:var(--line);background:color-mix(in srgb,var(--panel-solid) 82%,transparent);color:var(--muted-2)}
    #selectBox{position:absolute;border:1px solid var(--accent);background:rgba(0,208,156,.12);pointer-events:none;z-index:25}
    #contextMenu{position:fixed;z-index:80;min-width:190px;border:1px solid var(--line);border-radius:12px;background:var(--panel-solid);box-shadow:0 18px 50px rgba(0,0,0,.22);padding:6px;color:var(--fg)}
    #contextMenu button{display:flex;width:100%;align-items:center;justify-content:space-between;border-radius:8px;padding:8px 10px;text-align:left;font-size:13px}
    #contextMenu button:hover{background:var(--soft-hover)}
    @media(max-width:760px){#canvas{height:calc(100vh - 252px)}.node{width:286px}}
  </style>
</head>
<body>
  <div class="flex h-screen flex-col">
    <header class="app-header border-b px-4 py-4 backdrop-blur sm:px-6">
      <div class="flex flex-col gap-4">
        <div class="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-[#00d09c] text-[#07100d]">
              <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none"><path d="M6 6h7v7H6V6Zm10-1h3v3h-3V5ZM5 16h3v3H5v-3Zm11 0h3v3h-3v-3ZM13 9h3M9 13v3M16 8v8M8 16h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div>
              <h1 class="text-xl font-semibold">Prompt Canvas</h1>
              <p class="muted text-sm">本地 Prompt Registry + 可视化链路画布</p>
            </div>
          </div>
          <div class="flex flex-wrap gap-2">
            <button id="themeBtn" class="btn-ghost h-10 rounded-lg border px-3 text-sm">白天模式</button>
            <button id="layoutBtn" class="btn-ghost h-10 rounded-lg border px-3 text-sm">自动整理</button>
            <button id="resetView" class="btn-ghost h-10 rounded-lg border px-3 text-sm">重置视图</button>
            <button id="copyChainBtn" class="btn-ghost h-10 rounded-lg border px-3 text-sm">复制链路</button>
            <button id="exportBtn" class="btn-ghost h-10 rounded-lg border px-3 text-sm">导出</button>
            <button id="importBtn" class="btn-ghost h-10 rounded-lg border px-3 text-sm">导入</button>
            <button id="addBtn" class="h-10 rounded-lg bg-white px-4 text-sm font-semibold text-[#0b0e11] hover:bg-[#00d09c]">添加节点</button>
            <input id="importFile" type="file" accept="application/json" class="hidden">
          </div>
        </div>
        <div class="grid gap-3 xl:grid-cols-[1fr_150px_auto_auto_auto]">
          <input id="search" class="field h-11 rounded-lg border px-4 text-sm outline-none placeholder:text-zinc-500 focus:border-[#00d09c]" placeholder="搜索标题、标签、工具或提示词正文">
          <select id="toolFilter" class="field h-11 rounded-lg border px-3 text-sm outline-none focus:border-[#00d09c]"></select>
          <button id="favOnlyBtn" class="btn-ghost h-11 rounded-lg border px-3 text-sm">只看收藏</button>
          <div class="btn-ghost flex h-11 items-center gap-2 rounded-lg border px-3 text-sm muted">可见 <b id="count" class="text-current">0</b> 节点</div>
          <div class="btn-ghost flex h-11 items-center gap-2 rounded-lg border px-3">
            <button id="zoomOut" class="h-7 w-7 rounded-md hover:bg-black/10">-</button><span id="zoomText" class="w-12 text-center text-sm">100%</span><button id="zoomIn" class="h-7 w-7 rounded-md hover:bg-black/10">+</button>
          </div>
        </div>
        <nav id="tags" class="flex gap-2 overflow-x-auto pb-1 scrollbar-thin"></nav>
      </div>
    </header>

    <main class="relative flex-1">
      <section id="canvas">
        <div id="world"><svg id="edgesSvg"></svg><div id="nodes"></div></div>
        <div id="selectBox" class="hidden"></div>
        <div id="empty" class="pointer-events-none absolute inset-0 hidden items-center justify-center text-center"><div><div class="mx-auto flex h-14 w-14 items-center justify-center rounded-xl border text-zinc-400" style="border-color:var(--line);background:var(--soft)">□</div><h2 class="mt-4 text-lg font-semibold">没有匹配的节点</h2><p class="muted-2 mt-2 text-sm">调整搜索、工具或标签筛选，或者添加一个新节点。</p></div></div>
        <aside id="detail" class="panel pointer-events-auto absolute right-4 top-4 hidden max-h-[calc(100%-32px)] w-[360px] overflow-auto rounded-xl border p-4 shadow-2xl backdrop-blur scrollbar-thin">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <div class="mb-2 flex flex-wrap gap-2"><span id="detailTag" class="rounded-md bg-[#00d09c]/10 px-2 py-1 text-xs font-medium text-[#00d09c]"></span><span id="detailTool" class="rounded-md bg-white/10 px-2 py-1 text-xs text-zinc-300"></span></div>
              <h2 id="detailTitle" class="break-words text-base font-semibold"></h2>
            </div>
            <button id="closeDetail" class="h-8 w-8 rounded-lg text-zinc-400 hover:bg-white/10 hover:text-white">×</button>
          </div>
          <p id="detailBody" class="mt-3 max-h-48 overflow-auto whitespace-pre-wrap break-words text-sm leading-6 text-zinc-300 scrollbar-thin"></p>
          <div id="detailMeta" class="mt-3 text-xs text-zinc-500"></div>
          <div id="variableBox" class="mt-4 hidden rounded-lg border border-white/10 bg-white/[.035] p-3"></div>
          <div class="mt-4 rounded-lg border border-white/10 bg-white/[.035] p-3">
            <div class="mb-2 flex items-center justify-between"><h3 class="text-sm font-semibold">版本历史</h3><span id="versionCount" class="text-xs text-zinc-500"></span></div>
            <div id="versions" class="grid gap-2"></div>
          </div>
        </aside>
        <div class="hint pointer-events-none absolute bottom-4 left-4 rounded-lg border px-3 py-2 text-xs">拖动画布移动 · Shift + 左键框选 · 右键快捷菜单 · 从圆点拖到圆点连线</div>
      </section>
    </main>
  </div>

  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 px-4 backdrop-blur">
    <form id="form" class="panel w-full max-w-2xl rounded-xl border shadow-2xl">
      <div class="flex items-center justify-between border-b border-white/10 px-5 py-4"><h2 id="modalTitle" class="font-semibold">添加 Prompt 节点</h2><button id="closeBtn" type="button" class="h-9 w-9 rounded-lg text-zinc-400 hover:bg-white/10 hover:text-white">×</button></div>
      <div class="grid gap-4 px-5 py-5">
        <label class="grid gap-2 text-sm muted">标题<input id="title" required maxlength="80" class="field h-11 rounded-lg border px-3 outline-none focus:border-[#00d09c]" placeholder="例如：代码审查助手"></label>
        <div class="grid gap-4 sm:grid-cols-2">
          <label class="grid gap-2 text-sm muted">分类标签<input id="tag" list="tagList" required maxlength="28" class="field h-11 rounded-lg border px-3 outline-none focus:border-[#00d09c]" placeholder="输入或选择标签，例如：写作"><datalist id="tagList"></datalist></label>
          <label class="grid gap-2 text-sm muted">适用工具<input id="tool" list="toolList" maxlength="28" class="field h-11 rounded-lg border px-3 outline-none focus:border-[#00d09c]" placeholder="输入或选择工具，例如：ChatGPT"><datalist id="toolList"></datalist></label>
        </div>
        <label class="flex items-center gap-2 text-sm muted"><input id="favorite" type="checkbox" class="h-4 w-4 accent-[#00d09c]"> 收藏这个 Prompt</label>
        <label class="grid gap-2 text-sm muted">提示词正文<textarea id="body" required rows="10" class="field resize-y rounded-lg border px-3 py-3 leading-6 outline-none focus:border-[#00d09c]" placeholder="支持变量，例如：请把 {{content}} 翻译成 {{language}}"></textarea></label>
      </div>
      <div class="flex justify-end gap-3 border-t border-white/10 px-5 py-4"><button id="cancelBtn" type="button" class="h-10 rounded-lg border border-white/10 px-4 text-sm text-zinc-300 hover:bg-white/10">取消</button><button class="h-10 rounded-lg bg-[#00d09c] px-4 text-sm font-semibold text-[#07100d] hover:bg-white">保存节点</button></div>
    </form>
  </div>

  <div id="toast" class="panel fixed bottom-5 left-1/2 z-50 hidden -translate-x-1/2 rounded-lg border px-4 py-3 text-sm shadow-2xl"></div>
  <div id="contextMenu" class="hidden"></div>

  <script>
    const STORE='prompt-canvas-prompts-v4', EDGE_STORE='prompt-canvas-edges-v1', VIEW='prompt-canvas-view-v2', THEME='prompt-canvas-theme-v1', W=326, H=260;
    const now=Date.now();
    const seed=[
      {id:crypto.randomUUID(),title:'文章结构优化',tag:'写作',tool:'ChatGPT',favorite:true,body:'请作为资深中文编辑，帮我优化以下文章结构。请先指出逻辑断点，再给出更清晰的小标题安排，最后输出一版保持原意但更易读的改写稿。\n\n文章：{{content}}',x:-390,y:-120,versions:[],createdAt:now,updatedAt:now},
      {id:crypto.randomUUID(),title:'代码审查助手',tag:'编程',tool:'Claude',favorite:true,body:'请以高级工程师的视角审查以下代码，优先找出潜在 bug、边界条件、性能风险和可维护性问题。请按严重程度排序，并给出可执行的修复建议。\n\n代码：{{code}}',x:-40,y:-20,versions:[],createdAt:now,updatedAt:now},
      {id:crypto.randomUUID(),title:'中英自然翻译',tag:'翻译',tool:'通用',favorite:false,body:'请将以下内容翻译成自然、准确、适合 {{tone}} 场景的 {{language}}。避免逐字直译，并在必要处说明关键措辞选择。\n\n内容：{{content}}',x:310,y:-130,versions:[],createdAt:now,updatedAt:now}
    ];
    const $=id=>document.getElementById(id);
    const s={items:loadItems(),edges:loadEdges(),tag:'全部',tool:'全部',fav:false,q:'',edit:null,selected:null,selection:new Set(),pendingPos:null,view:loadView(),theme:localStorage.getItem(THEME)||'dark',drag:null,temp:null,vars:{}};
    const el={canvas:$('canvas'),world:$('world'),svg:$('edgesSvg'),nodes:$('nodes'),selectBox:$('selectBox'),menu:$('contextMenu'),tags:$('tags'),toolFilter:$('toolFilter'),favOnly:$('favOnlyBtn'),count:$('count'),empty:$('empty'),zoom:$('zoomText'),modal:$('modal'),form:$('form'),title:$('title'),tagInput:$('tag'),toolInput:$('tool'),tagList:$('tagList'),toolList:$('toolList'),favorite:$('favorite'),body:$('body'),toast:$('toast'),detail:$('detail'),detailTitle:$('detailTitle'),detailTag:$('detailTag'),detailTool:$('detailTool'),detailBody:$('detailBody'),detailMeta:$('detailMeta'),variableBox:$('variableBox'),versions:$('versions'),versionCount:$('versionCount')};

    function loadItems(){try{let a=JSON.parse(localStorage.getItem(STORE)||localStorage.getItem('prompt-canvas-prompts-v3')||localStorage.getItem('prompt-canvas-prompts-v2')||localStorage.getItem('prompt-vault-items-v1')||'null');if(!Array.isArray(a))a=seed;return a.map((p,i)=>({...p,tool:p.tool||'通用',favorite:Boolean(p.favorite),versions:Array.isArray(p.versions)?p.versions:[],x:Number.isFinite(p.x)?p.x:-360+i%4*380,y:Number.isFinite(p.y)?p.y:-120+Math.floor(i/4)*300,createdAt:p.createdAt||Date.now(),updatedAt:p.updatedAt||Date.now()}))}catch{return seed}}
    function loadEdges(){try{let a=JSON.parse(localStorage.getItem(EDGE_STORE)||'[]');return Array.isArray(a)?a.filter(e=>e.from&&e.to&&e.from!==e.to):[]}catch{return[]}}
    function loadView(){try{let v=JSON.parse(localStorage.getItem(VIEW));if(v&&isFinite(v.x)&&isFinite(v.y)&&isFinite(v.scale))return{x:v.x,y:v.y,scale:Math.min(1.7,Math.max(.5,v.scale))}}catch{}return{x:innerWidth/2,y:250,scale:1}}
    function saveItems(){localStorage.setItem(STORE,JSON.stringify(s.items))}function saveEdges(){localStorage.setItem(EDGE_STORE,JSON.stringify(s.edges))}function saveView(){localStorage.setItem(VIEW,JSON.stringify(s.view))}function saveTheme(){localStorage.setItem(THEME,s.theme)}
    function esc(v){return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
    function node(id){return s.items.find(p=>p.id===id)}function filtered(){let q=s.q.trim().toLowerCase();return s.items.filter(p=>(s.tag==='全部'||p.tag===s.tag)&&(s.tool==='全部'||p.tool===s.tool)&&(!s.fav||p.favorite)&&(!q||`${p.title} ${p.tag} ${p.tool} ${p.body}`.toLowerCase().includes(q)))}function visibleIds(){return new Set(filtered().map(p=>p.id))}
    function point(cx,cy){let r=el.canvas.getBoundingClientRect();return{x:(cx-r.left-s.view.x)/s.view.scale,y:(cy-r.top-s.view.y)/s.view.scale}}function portPoint(id,side){let p=node(id);return side==='left'?{x:p.x,y:p.y+H/2}:{x:p.x+W,y:p.y+H/2}}function pathBetween(a,b){let dx=Math.max(80,Math.abs(b.x-a.x)*.45);return`M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`}function edgePath(e){return pathBetween(portPoint(e.from,'right'),portPoint(e.to,'left'))}
    function relatedIds(){if(!s.selected)return new Set();let ids=new Set([s.selected]);s.edges.forEach(e=>{if(e.from===s.selected)ids.add(e.to);if(e.to===s.selected)ids.add(e.from)});return ids}function selectedIds(){return s.selection.size?[...s.selection]:(s.selected?[s.selected]:[])}function applyView(){el.world.style.transform=`translate(${s.view.x}px,${s.view.y}px) scale(${s.view.scale})`;el.zoom.textContent=Math.round(s.view.scale*100)+'%'}
    function applyTheme(){document.body.classList.toggle('light',s.theme==='light');$('themeBtn').textContent=s.theme==='light'?'深色模式':'白天模式'}
    function cleanLabel(v,fallback='其他'){return (v||'').trim().replace(/\s+/g,' ').slice(0,28)||fallback}
    function variables(body){return [...new Set([...body.matchAll(/\{\{\s*([a-zA-Z0-9_\u4e00-\u9fa5-]+)\s*\}\}/g)].map(m=>m[1]))]}function compile(body){return body.replace(/\{\{\s*([a-zA-Z0-9_\u4e00-\u9fa5-]+)\s*\}\}/g,(_,k)=>s.vars[k]||`{{${k}}}`)}

    function renderTags(){let tags=['全部',...[...new Set(s.items.map(p=>p.tag))].sort((a,b)=>a.localeCompare(b,'zh-CN'))];el.tags.innerHTML=tags.map(t=>`<button data-tag="${esc(t)}" class="shrink-0 rounded-lg border px-3 py-2 text-sm ${t===s.tag?'border-[#00d09c] bg-[#00d09c] text-[#07100d]':'btn-ghost'}">${esc(t)}</button>`).join('')}
    function renderLists(){let tags=[...new Set(['写作','编程','翻译','营销','学习','总结','分析','其他',...s.items.map(p=>p.tag)])].filter(Boolean).sort((a,b)=>a.localeCompare(b,'zh-CN'));let tools=[...new Set(['通用','ChatGPT','Claude','Gemini','Midjourney','Cursor','Perplexity',...s.items.map(p=>p.tool||'通用')])].filter(Boolean).sort((a,b)=>a.localeCompare(b,'zh-CN'));el.tagList.innerHTML=tags.map(t=>`<option value="${esc(t)}"></option>`).join('');el.toolList.innerHTML=tools.map(t=>`<option value="${esc(t)}"></option>`).join('')}
    function renderToolFilter(){let tools=['全部',...[...new Set(s.items.map(p=>p.tool||'通用'))].sort((a,b)=>a.localeCompare(b,'zh-CN'))];el.toolFilter.innerHTML=tools.map(t=>`<option ${t===s.tool?'selected':''}>${esc(t)}</option>`).join('');el.favOnly.classList.toggle('border-[#00d09c]',s.fav);el.favOnly.classList.toggle('text-[#00d09c]',s.fav)}
    function renderEdges(){let ids=visibleIds();let html=s.edges.filter(e=>node(e.from)&&node(e.to)&&ids.has(e.from)&&ids.has(e.to)).map(e=>{let a=portPoint(e.from,'right'),b=portPoint(e.to,'left'),mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2-10},active=s.selected&&(e.from===s.selected||e.to===s.selected),dim=s.selected&&!active;return`<g class="edge-group" data-edge-id="${e.id}"><path class="edge-hit" data-act="select-edge" data-id="${e.id}" d="${edgePath(e)}"></path><path class="edge-path ${active?'active':''} ${dim?'dimmed':''}" data-act="select-edge" data-id="${e.id}" d="${edgePath(e)}"></path>${e.label?`<text class="edge-label" x="${mid.x}" y="${mid.y}" text-anchor="middle">${esc(e.label)}</text>`:''}<circle class="edge-delete" data-act="delete-edge" data-id="${e.id}" cx="${mid.x}" cy="${mid.y+14}" r="9"></circle><text class="edge-delete-x" x="${mid.x}" y="${mid.y+18}" text-anchor="middle">×</text></g>`}).join('');if(s.temp)html+=`<path class="temp-edge" d="${pathBetween(s.temp.from,s.temp.to)}"></path>`;el.svg.innerHTML=html}

    el.form.onsubmit=e=>{e.preventDefault();let title=el.title.value.trim(),body=el.body.value.trim(),tag=cleanLabel(el.tagInput.value,'其他'),tool=cleanLabel(el.toolInput.value,'通用');if(!title||!body)return;let editing=Boolean(s.edit),old=node(s.edit),r=el.canvas.getBoundingClientRect(),c=point(r.left+r.width/2,r.top+r.height/2),pos=s.pendingPos,time=Date.now(),next={id:s.edit||crypto.randomUUID(),title,tag,tool,favorite:el.favorite.checked,body,x:old?.x??Math.round(pos?.x??c.x-W/2),y:old?.y??Math.round(pos?.y??c.y-H/2),versions:old?.versions||[],createdAt:old?.createdAt||time,updatedAt:time};if(editing&&old&&(old.title!==title||old.tag!==next.tag||old.tool!==next.tool||old.favorite!==next.favorite||old.body!==body)){let message=prompt('这次修改的说明（用于版本历史）','优化 Prompt');next.versions=[...(old.versions||[]),{id:crypto.randomUUID(),title:old.title,tag:old.tag,tool:old.tool,favorite:old.favorite,body:old.body,message:message||'未填写说明',savedAt:time}]}s.items=editing?s.items.map(p=>p.id===s.edit?next:p):[next,...s.items];s.selected=next.id;s.selection.clear();saveItems();closeModal();render();toast(editing?'已更新节点':'已添加节点')};
    render();
  </script>
